name: Accessibility Regression Check

on:
  pull_request:

jobs:
  a11y:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: zachkklein/WCAG_PR_Checker@llm_added
        with:
          APP_DIR: 'my-app'
          BUILD_DIR: 'my-app/dist'
          URLS: '/'