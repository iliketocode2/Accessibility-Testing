# a11y-check.yml
# Runs on every pull request.
# Checks out both main and PR branches, scans both with axe,
# diffs the results, posts a PR comment, and fails if regressions exist.

name: Accessibility Regression Check

on:
  pull_request:

jobs:
  a11y-regression:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write   # needed to post PR comments

    steps:
      # ── 1. Checkout PR branch ───────────────────────────────────────────────
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pr-branch

      # ── 2. Checkout main (base) branch ──────────────────────────────────────
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: main-branch

      # ── 3. Setup Node ────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: pr-branch/my-app/package-lock.json

      # ── 4. Install dependencies ──────────────────────────────────────────────
      # We only need to install once (in pr-branch) because:
      #   - scan.js, diff.js, comment.js all live in pr-branch
      #   - We're serving main-branch's BUILD OUTPUT, not running its node_modules
      #   - Playwright only needs to be installed once on the runner
      - name: Install dependencies (PR branch)
        working-directory: pr-branch/my-app
        run: npm ci

      # Install Playwright browser binaries — only needed once per runner.
      # --with-deps installs OS-level dependencies (fonts, libs) required in CI.
      - name: Install Playwright browsers
        working-directory: pr-branch/my-app
        run: npx playwright install chromium --with-deps

      # ── 5.5. Ensure main branch uses static export config ───────────────────
      # Write the static export config to main branch BEFORE installing
      # dependencies to ensure the config is in place for the build.
      # This allows the workflow to work even if main branch hasn't been updated yet.
      - name: Update main branch config for static export
        working-directory: main-branch/my-app
        run: |
          echo "Writing static export config to main branch..."
          cat > next.config.ts << 'EOF'
          import type { NextConfig } from "next";

          const nextConfig: NextConfig = {
            output: 'export',
          };

          export default nextConfig;
          EOF
          echo "✓ Updated main branch next.config.ts with static export config"
          echo ""
          echo "Verifying config..."
          cat next.config.ts

      # ── 5. Install dependencies for main branch build ───────────────────────
      # We need main-branch's own node_modules to build it correctly.
      # We do NOT install Playwright here — the build tools are enough.
      - name: Install dependencies (main branch — build only)
        working-directory: main-branch/my-app
        run: npm ci

      # ── 6. Build both branches ───────────────────────────────────────────────
      - name: Clean and build PR branch
        working-directory: pr-branch/my-app
        run: |
          rm -rf .next out
          npm run build

      - name: Clean and build main branch
        working-directory: main-branch/my-app
        run: |
          rm -rf .next out
          npm run build

      # ── 6.3. Debug: Check what Next.js actually created ────────────────────
      - name: Debug build outputs
        run: |
          echo "=== PR Branch Build Output ==="
          ls -la pr-branch/my-app/ | grep -E "(out|\.next)" || echo "No out or .next found"
          echo ""
          echo "=== Main Branch Build Output ==="
          ls -la main-branch/my-app/ | grep -E "(out|\.next)" || echo "No out or .next found"
          echo ""
          echo "=== Main Branch Config Check ==="
          cat main-branch/my-app/next.config.ts || echo "Config file not found"

      # ── 6.5. Verify builds created output directories ────────────────────────
      - name: Verify build outputs
        run: |
          echo "Checking PR branch build output..."
          if [ ! -d "pr-branch/my-app/out" ]; then
            echo "ERROR: pr-branch/my-app/out directory does not exist!"
            echo "Build may have failed or Next.js is not configured for static export"
            ls -la pr-branch/my-app/ || true
            exit 1
          fi
          echo "Checking main branch build output..."
          if [ ! -d "main-branch/my-app/out" ]; then
            echo "ERROR: main-branch/my-app/out directory does not exist!"
            echo "Build may have failed or Next.js is not configured for static export"
            ls -la main-branch/my-app/ || true
            exit 1
          fi
          echo "Both builds have output directories ✓"

      # ── 7. Verify builds and serve both on different ports ───────────────────
      - name: Verify builds and start servers
        run: |
          echo "Checking build outputs..."
          ls -la main-branch/my-app/out || echo "Main branch out directory not found"
          ls -la pr-branch/my-app/out || echo "PR branch out directory not found"
          
          echo "Starting servers..."
          cd main-branch/my-app && npx serve out -l 4000 > /tmp/serve-4000.log 2>&1 &
          SERVE_4000_PID=$!
          echo "Started main branch server (PID: $SERVE_4000_PID)"
          
          cd ../../pr-branch/my-app && npx serve out -l 5000 > /tmp/serve-5000.log 2>&1 &
          SERVE_5000_PID=$!
          echo "Started PR branch server (PID: $SERVE_5000_PID)"
          
          # Give servers a moment to start
          sleep 2
          
          # Check if processes are still running
          ps aux | grep serve || echo "No serve processes found"
          
          # Wait for both servers to be ready
          cd ../../pr-branch/my-app
          npx wait-on http://localhost:4000 --timeout 30000 || (echo "Port 4000 failed" && cat /tmp/serve-4000.log && exit 1)
          npx wait-on http://localhost:5000 --timeout 30000 || (echo "Port 5000 failed" && cat /tmp/serve-5000.log && exit 1)
          
          echo "Both servers are ready!"

      # ── 9. Run axe scan on main (baseline) ──────────────────────────────────
      - name: Scan main branch (baseline)
        working-directory: pr-branch
        run: node .a11y/scan.js --baseUrl http://localhost:4000 --output baseline.json

      # ── 10. Run axe scan on PR branch ───────────────────────────────────────
      - name: Scan PR branch
        working-directory: pr-branch
        run: node .a11y/scan.js --baseUrl http://localhost:5000 --output pr.json

      # ── 11. Diff the two scan results ───────────────────────────────────────
      # Exit code 1 from diff.js means regressions were found.
      # We use || true here so the step doesn't stop the workflow —
      # we want comment.js to run and post the result regardless.
      - name: Diff accessibility results
        working-directory: pr-branch
        run: node .a11y/diff.js --baseline baseline.json --head pr.json --output diff.json || true

      # ── 12. Post PR comment and set final status ─────────────────────────────
      # comment.js exits 1 if diff.json contains regressions — this is what
      # actually fails the GitHub check. Separating it from diff.js means
      # the PR always gets a comment even when the check fails.
      - name: Post PR comment
        working-directory: pr-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .a11y/comment.js --diff diff.json

      # ── 13. Upload scan artifacts for debugging ──────────────────────────────
      # Useful when you need to inspect raw axe output after a run.
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-scan-results
          path: |
            pr-branch/baseline.json
            pr-branch/pr.json
            pr-branch/diff.json
          retention-days: 7